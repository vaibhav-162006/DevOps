name: CI pipeline

on:
  push:
    branches: [ main ]
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
     - name: Checkout code
       uses: actions/Checkout@v5

     - name: Set up Node.js
       uses: actions/setup-node@v4
       with:
        node-version: 22

     - name: Install dependencies
       run: npm install

     - name: Run tests
       run: npm test 

